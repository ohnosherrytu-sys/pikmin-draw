<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>🌱 誰是幸運兒？ 🌱</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { 
            /* 背景：深藍紫色，眼睛最舒適 */
            --bg: #1A1A2E; 
            /* 糖果繽紛色組：可愛、活力、不詭異 */
            --color1: #FFADAD; /* 草莓 */
            --color2: #FFD6A5; /* 奶油 */
            --color3: #FDFFB6; /* 檸檬 */
            --color4: #CAFFBF; /* 薄荷 */
            --color5: #A0C4FF; /* 蘇打 */
        }
        body { 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            background: var(--bg); color: #FFF; margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        h1 { 
            font-size: 3rem; color: var(--color1); 
            text-shadow: 2px 2px 10px rgba(255, 173, 173, 0.5); 
            margin: 20px 0; font-weight: bold;
        }
        
        .control-panel { 
            background: rgba(255, 255, 255, 0.08); padding: 20px; 
            border-radius: 25px; border: 2px dashed var(--color5);
            display: flex; flex-direction: column; gap: 15px; align-items: center; margin-bottom: 20px;
            backdrop-filter: blur(10px); width: 90%; max-width: 600px;
        }
        
        #manualInput {
            width: 100%; height: 80px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--color5); color: #fff; padding: 12px;
            border-radius: 15px; resize: none; font-size: 1rem;
        }

        #machine-container { 
            width: 500px; height: 500px; 
            background: radial-gradient(circle, #16213E 0%, #0F3460 100%);
            border: 10px solid var(--color5); border-radius: 50%; 
            position: relative; overflow: hidden;
            box-shadow: 0 0 30px rgba(160, 196, 255, 0.3);
        }

        .draw-btn { 
            padding: 12px 50px; font-size: 1.4rem; font-weight: bold; 
            background: linear-gradient(135deg, var(--color1), var(--color5)); 
            color: #1A1A2E; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s;
        }
        .draw-btn:hover { transform: scale(1.08); filter: brightness(1.1); }
        .draw-btn:disabled { opacity: 0.3; }

        #result-display { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 30px; width: 90%; padding-bottom: 40px; }

        .win-ball { 
            width: 110px; height: 110px; border-radius: 50%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #1A1A2E; font-weight: bold;
        }
        .win-ball.main { background: linear-gradient(135deg, var(--color2), var(--color1)); border: 4px solid #FFF; }
        .win-ball.wait { background: linear-gradient(135deg, var(--color4), var(--color5)); border: 4px solid #FFF; }
        .win-ball::before { content: '✨'; position: absolute; top: -10px; font-size: 20px; }

        .download-btn { margin-top: 20px; padding: 12px 25px; background: var(--color4); color: #1A1A2E; border: none; border-radius: 15px; cursor: pointer; display: none; font-weight: bold; }
        
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        input[type="number"] { width: 50px; border-radius: 8px; border: 1px solid var(--color5); text-align: center; background: #FFF; color: #1A1A2E; padding: 5px; }
        label { font-weight: bold; color: var(--color3); }
        input[type="file"] { color: var(--color5); font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>🌱 誰是幸運兒？ 🌱</h1>

    <div class="control-panel">
        <textarea id="manualInput" placeholder="請在此每行輸入一個姓名..."></textarea>
        <div style="font-size: 0.8rem; color: var(--color5);">✨ 或者上傳 Excel 檔案 ✨</div>
        <input type="file" id="fileInput" accept=".xlsx, .xls">

        <div style="display: flex; gap: 15px; align-items: center; margin-top: 10px;">
            <label>正取:</label> <input type="number" id="mainQ" value="5">
            <label>備取:</label> <input type="number" id="waitQ" value="5">
            <button class="draw-btn" id="startBtn" onclick="handleStart()">開始抽獎！</button>
        </div>
    </div>

    <div id="machine-container"></div>
    <div id="result-display"></div>
    <button id="downloadBtn" class="download-btn" onclick="exportResults()">📥 下載得獎名單</button>

    <audio id="sound-shake" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" loop></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/1992/1992-preview.mp3"></audio>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Body } = Matter;
    let engine, render, runner, balls = [];
    let names = [];
    let winners = [];
    // 可愛糖果色系
    const colors = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#A0C4FF'];

    function init() {
        const container = document.getElementById('machine-container');
        container.innerHTML = ''; 
        engine = Engine.create();
        render = Render.create({
            element: container,
            engine: engine,
            options: { width: 500, height: 500, wireframes: false, background: 'transparent' }
        });

        for (let i = 0; i < 60; i++) {
            const angle = (i / 60) * Math.PI * 2;
            const wall = Bodies.rectangle(
                250 + Math.cos(angle) * 245, 
                250 + Math.sin(angle) * 245, 
                50, 20, { isStatic: true, angle: angle + Math.PI/2, render: { visible: false } }
            );
            Composite.add(engine.world, wall);
        }

        Render.run(render);
        runner = Runner.create();
        Runner.run(runner, engine);
    }

    document.getElementById('fileInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            const data = new Uint8Array(ev.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            names = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1}).map(r => r[0]).filter(n => n);
            document.getElementById('manualInput').value = names.join('\n');
            alert("✨ 成功讀取 " + names.length + " 位夥伴！");
            init();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };

    async function handleStart() {
        const rawText = document.getElementById('manualInput').value;
        names = rawText.split('\n').map(n => n.trim()).filter(n => n !== "");

        if (!names.length) return alert("請輸入名單喔！");
        const mQ = parseInt(document.getElementById('mainQ').value) || 0;
        const wQ = parseInt(document.getElementById('waitQ').value) || 0;
        if (mQ + wQ > names.length) return alert("人數不足以抽出這麼多獎項喔！");

        document.getElementById('startBtn').disabled = true;
        document.getElementById('result-display').innerHTML = '';
        winners = [];

        if(balls.length > 0) {
            Composite.remove(engine.world, balls);
            balls = [];
        }

        document.getElementById('sound-shake').play();
        
        for (let name of names) {
            const ball = Bodies.circle(250 + (Math.random()-0.5)*50, 50, 26, {
                restitution: 1, friction: 0.02,
                render: { 
                    fillStyle: colors[Math.floor(Math.random()*colors.length)], 
                    strokeStyle: '#FFF', lineWidth: 3 
                }
            });
            balls.push(ball);
            Composite.add(engine.world, ball);
            await new Promise(r => setTimeout(r, 40)); 
        }

        await new Promise(r => setTimeout(r, 800));

        const shaker = setInterval(() => {
            balls.forEach(b => Body.applyForce(b, b.position, { x: (Math.random()-0.5)*0.06, y: -0.08 }));
        }, 120);

        const shuffled = [...names].sort(() => Math.random() - 0.5);
        const winSound = document.getElementById('sound-win');

        for (let i = 0; i < (mQ + wQ); i++) {
            await new Promise(r => setTimeout(r, 1500));
            winSound.pause();
            winSound.currentTime = 0; 
            winSound.play();

            const isMain = i < mQ;
            const type = isMain ? "正取" : "備取";
            winners.push({ "姓名": shuffled[i], "狀態": type });

            const el = document.createElement('div');
            el.className = `win-ball ${isMain ? 'main' : 'wait'}`;
            el.innerHTML = `<span style="font-size:0.7rem">${type}</span><span style="font-size:1.1rem">${shuffled[i]}</span>`;
            document.getElementById('result-display').appendChild(el);
            
            if (balls.length > 0) Composite.remove(engine.world, balls.pop());
        }

        clearInterval(shaker);
        document.getElementById('sound-shake').pause();
        document.getElementById('downloadBtn').style.display = 'block';
        document.getElementById('startBtn').disabled = false;
    }

    function exportResults() {
        const ws = XLSX.utils.json_to_sheet(winners);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "得獎名單");
        XLSX.writeFile(wb, "幸運兒名單.xlsx");
    }

    init();
</script>
</body>
</html>
