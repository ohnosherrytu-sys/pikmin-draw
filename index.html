<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>誰是幸運兒？</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { 
            --color1: #0ABAB5; --color2: #F8F32B; --color3: #714955; 
            --color4: #035E7B; --color5: #002E2C; --bg: #001a19; 
        }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background: var(--bg); color: white; margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        h1 { font-size: 3rem; color: var(--color1); text-shadow: 0 0 15px rgba(10, 186, 181, 0.5); margin: 20px 0; }
        
        .control-panel { 
            background: rgba(255,255,255,0.1); padding: 25px; 
            border-radius: 20px; border: 1px solid var(--color1);
            display: flex; flex-direction: column; gap: 15px; align-items: center; margin-bottom: 20px;
            backdrop-filter: blur(10px); width: 90%; max-width: 600px;
        }
        
        .input-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
        
        /* 手動輸入框樣式 */
        #manualInput {
            width: 100%; height: 80px; background: rgba(0,0,0,0.3);
            border: 1px dashed var(--color1); color: #fff; padding: 10px;
            border-radius: 10px; resize: vertical; font-family: inherit;
        }
        #manualInput::placeholder { color: rgba(255,255,255,0.3); }

        #machine-container { width: 500px; height: 500px; background: radial-gradient(circle, var(--color5) 0%, #000 100%); border: 8px solid var(--color1); border-radius: 50%; position: relative; overflow: hidden; }
        canvas { display: block; }
        .draw-btn { padding: 12px 45px; font-size: 1.4rem; font-weight: bold; background: linear-gradient(135deg, var(--color1), var(--color4)); color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .draw-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--color1); }
        .draw-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        #result-display { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 30px; width: 90%; }
        .win-ball { width: 110px; height: 110px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; animation: pop 0.5s ease-out; }
        .win-ball.main { background: linear-gradient(135deg, var(--color2), var(--color1)); color: #000; border: 3px solid #fff; }
        .win-ball.wait { background: linear-gradient(135deg, var(--color3), var(--color4)); color: #fff; border: 3px solid var(--color1); }
        .win-ball::before { content: '🌱'; position: absolute; top: -10px; font-size: 20px; }
        
        .download-btn { margin-top: 20px; padding: 10px 20px; background: var(--color1); border: none; border-radius: 10px; cursor: pointer; display: none; font-weight: bold; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        input[type="number"] { width: 50px; border-radius: 5px; border: 1px solid var(--color1); text-align: center; background: #000; color: #fff; padding: 5px; }
        label { font-size: 0.9rem; color: var(--color1); }
    </style>
</head>
<body>

    <h1>🌱 誰是幸運兒？ 🌱</h1>

    <div class="control-panel">
        <textarea id="manualInput" placeholder="在此輸入姓名（每行一個，或直接從 Excel 貼上單欄文字）"></textarea>
        
        <div style="font-size: 0.8rem; color: #888;">── 或者 ──</div>
        
        <input type="file" id="fileInput" accept=".xlsx, .xls">

        <div class="input-group">
            <label>正取:</label> <input type="number" id="mainQ" value="5">
            <label>備取:</label> <input type="number" id="waitQ" value="5">
            <button class="draw-btn" id="startBtn" onclick="handleStart()">喚醒精靈！</button>
        </div>
    </div>

    <div id="machine-container"></div>
    <div id="result-display"></div>
    <button id="downloadBtn" class="download-btn" onclick="exportResults()">📥 下載名單</button>

    <audio id="sound-shake" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" loop></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/1992/1992-preview.mp3"></audio>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Body } = Matter;
    let engine, render, runner, balls = [];
    let names = [];
    let winners = [];
    const colors = ['#0ABAB5', '#F8F32B', '#714955', '#035E7B', '#002E2C'];

    function init() {
        const container = document.getElementById('machine-container');
        container.innerHTML = ''; 
        engine = Engine.create();
        render = Render.create({
            element: container,
            engine: engine,
            options: { width: 500, height: 500, wireframes: false, background: 'transparent' }
        });

        const parts = 60;
        for (let i = 0; i < parts; i++) {
            const angle = (i / parts) * Math.PI * 2;
            const x = 250 + Math.cos(angle) * 245;
            const y = 250 + Math.sin(angle) * 245;
            const wall = Bodies.rectangle(x, y, 50, 20, { isStatic: true, angle: angle + Math.PI/2, render: { visible: false } });
            Composite.add(engine.world, wall);
        }

        Render.run(render);
        runner = Runner.create();
        Runner.run(runner, engine);
    }

    // Excel 處理
    document.getElementById('fileInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            const data = new Uint8Array(ev.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            names = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1}).map(r => r[0]).filter(n => n);
            document.getElementById('manualInput').value = names.join('\n'); // 同步顯示到文字框
            alert("成功載入 " + names.length + " 人！");
            init();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };

    async function handleStart() {
        // 抓取手動輸入的名單
        const rawText = document.getElementById('manualInput').value;
        names = rawText.split('\n').map(n => n.trim()).filter(n => n !== "");

        if (!names.length) return alert("請輸入姓名或上傳 Excel！");
        
        const mQ = parseInt(document.getElementById('mainQ').value) || 0;
        const wQ = parseInt(document.getElementById('waitQ').value) || 0;
        if (mQ + wQ > names.length) return alert("總抽獎人數超過名單總數！");

        const startBtn = document.getElementById('startBtn');
        startBtn.disabled = true;
        document.getElementById('result-display').innerHTML = '';
        winners = [];

        // 重新初始化球池
        if(balls.length > 0) {
            Composite.remove(engine.world, balls);
            balls = [];
        }

        document.getElementById('sound-shake').play();
        
        // 1. 掉落球體
        for (let name of names) {
            const ball = Bodies.circle(250 + (Math.random()-0.5)*40, 50, 26, {
                restitution: 1.1, friction: 0.05,
                render: { fillStyle: colors[Math.floor(Math.random()*colors.length)], strokeStyle: '#fff', lineWidth: 2 }
            });
            balls.push(ball);
            Composite.add(engine.world, ball);
            await new Promise(r => setTimeout(r, 40)); 
        }

        await new Promise(r => setTimeout(r, 1000));

        // 2. 攪動
        const shaker = setInterval(() => {
            balls.forEach(b => Body.applyForce(b, b.position, { x: (Math.random()-0.5)*0.08, y: -0.1 }));
        }, 100);

        // 3. 抽籤揭曉
        const shuffled = [...names].sort(() => Math.random() - 0.5);
        const winSound = document.getElementById('sound-win');

        for (let i = 0; i < (mQ + wQ); i++) {
            await new Promise(r => setTimeout(r, 1500));
            winSound.pause();
            winSound.currentTime = 0; 
            winSound.play();

            const isMain = i < mQ;
            const type = isMain ? "正取" : "備取";
            winners.push({ "姓名": shuffled[i], "狀態": type });

            const el = document.createElement('div');
            el.className = `win-ball ${isMain ? 'main' : 'wait'}`;
            el.innerHTML = `<span class="type-tag">${type}</span><span class="name-tag">${shuffled[i]}</span>`;
            document.getElementById('result-display').appendChild(el);
            
            if (balls.length > 0) Composite.remove(engine.world, balls.pop());
        }

        clearInterval(shaker);
        document.getElementById('sound-shake').pause();
        document.getElementById('downloadBtn').style.display = 'block';
        startBtn.disabled = false;
    }

    function exportResults() {
        const ws = XLSX.utils.json_to_sheet(winners);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "結果");
        XLSX.writeFile(wb, "抽籤結果.xlsx");
    }

    init();
</script>
</body>
</html>
